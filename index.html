                >
                    <div className="relative w-full h-full [transform-style:preserve-3d] transition-transform duration-700 ease-[cubic-bezier(0.25,1,0.5,1)] group-hover:[transform:rotateY(180deg)]">
                        
                        {/* 正面 (Front Side) */}
                        <div className="absolute inset-0 [backface-visibility:hidden] bg-gray-50 dark:bg-[#111111] border border-gray-200 dark:border-gray-800 rounded-full flex flex-col items-center justify-between py-8 md:py-10 shadow-sm transition-colors group-hover:border-gray-400 dark:group-hover:border-gray-600">
                            <span className="text-gray-400 dark:text-gray-500 font-mono text-xs md:text-sm font-bold">
                                {item.num}
                            </span>
                            <span 
                                className="text-black dark:text-white font-bold tracking-[0.3em] md:tracking-[0.5em] text-sm md:text-lg" 
                                style={{ writingMode: 'vertical-rl', textOrientation: 'upright' }}
                            >
                                {item.title}
                            </span>
                            <div className="w-2 h-2 md:w-3 md:h-3 rounded-full bg-gray-300 dark:bg-gray-700"></div>
                        </div>

                        {/* 背面 (Back Side - 品牌色与说明文案) */}
                        <div className="absolute inset-0 [backface-visibility:hidden] [transform:rotateY(180deg)] bg-[#B8F500] border border-[#B8F500] rounded-full flex flex-col items-center justify-center py-6 px-1.5 md:px-3 shadow-xl overflow-hidden">
                            <span 
                                className="text-black font-bold text-[11px] md:text-[13px] tracking-[0.15em] md:tracking-[0.2em] leading-loose md:leading-loose text-center" 
                                style={{ writingMode: 'vertical-rl' }}
                            >
                                {item.desc}
                            </span>
                        </div>

                    </div>
                </div>
            );
        };

        const VisualExploration = ({ t, setCursorType }) => (
            <section id="skills" className="py-32 px-4 md:px-16 max-w-7xl mx-auto border-t border-gray-100 dark:border-gray-900 transition-colors">
                {/* 头部标题与擅长标签 */}
                <div className="flex flex-col md:flex-row justify-between items-start md:items-end mb-16 gap-6">
                    <div className="max-w-xl">
                        <h2 
                            className="text-5xl md:text-6xl font-extrabold text-black dark:text-white transition-colors"
                            onMouseEnter={() => setCursorType('hover')}
                            onMouseLeave={() => setCursorType('default')}
                        >
                            My <span className="text-[#B8F500]">{t.skills.titleHighlight}</span>
                        </h2>
                        <span className="text-sm text-gray-500 mt-2 block tracking-widest">{t.skills.subtitle}</span>
                        <p className="text-gray-500 dark:text-gray-400 mt-6 text-sm md:text-base leading-relaxed transition-colors">{t.skills.desc}</p>
                    </div>
                    
                    <div className="flex flex-col items-start md:items-end gap-3 shrink-0">
                        <span className="text-xs font-mono text-gray-400 dark:text-gray-600 uppercase tracking-widest">{t.skills.specialtiesLabel}</span>
                        <div className="flex flex-wrap gap-2">
                            {t.skills.specialties.map((spec, i) => (
                                <span 
                                    key={i} 
                                    className="px-4 py-2 text-sm bg-gray-50 dark:bg-[#1a1a1a] border border-gray-200 dark:border-gray-800 rounded-full font-medium text-gray-700 dark:text-gray-300 transition-all hover:border-gray-400 dark:hover:border-gray-600"
                                    onMouseEnter={() => setCursorType('hover')}
                                    onMouseLeave={() => setCursorType('default')}
                                >
                                    {spec}
                                </span>
                            ))}
                        </div>
                    </div>
                </div>

                {/* 漫剧生产能力 - 6个竖细条卡片 */}
                <div className="border-t border-gray-200 dark:border-gray-800 pt-10">
                    <div className="flex justify-start md:justify-center items-center gap-3 md:gap-6 overflow-x-auto hide-scrollbar pb-8 px-4 w-full">
                        {t.visual.items.map((item, idx) => <SkillCard key={idx} item={item} setCursorType={setCursorType} />)}
                    </div>
                </div>
            </section>
        );

        const MasonryProjectCard = ({ item, setCursorType }) => {
            const [isHovered, setIsHovered] = useState(false);
            const [gifLoaded, setGifLoaded] = useState(false);
            const isMobile = typeof window !== 'undefined' && window.innerWidth <= 768;
            
            const isVertical = item.aspectClass === 'aspect-[3/4]' || item.aspectClass === 'aspect-[2/3]';
            const baseFlexClass = isVertical ? 'flex-[1.5]' : 'flex-[1]';

            const handleMouseEnter = () => {
                if (isMobile) return;
                setIsHovered(true);
                setCursorType('hover');
            };

            const handleMouseLeave = () => {
                if (isMobile) return;
                setIsHovered(false);
                setCursorType('default');
            };

            return (
                <div 
                    className={`relative w-full rounded-2xl overflow-hidden ${isMobile ? 'cursor-default' : 'cursor-pointer group/card'} bg-gray-100 dark:bg-[#111111] border border-gray-200 dark:border-gray-800 ${!isMobile ? 'transition-[flex,box-shadow,border-color] duration-700 ease-[cubic-bezier(0.25,1,0.5,1)] hover:z-10 hover:shadow-2xl dark:hover:shadow-[#B8F500]/20 hover:border-[#B8F500]/50 hover:flex-[2.5] md:hover:flex-[3]' : ''} ${baseFlexClass}`}
                    onMouseEnter={handleMouseEnter}
                    onMouseLeave={handleMouseLeave}
                >
                    <div className={`absolute inset-0 w-full h-full bg-gradient-to-br ${item.gradient}`}>
                        
                        <div className={`absolute inset-0 w-full h-full ${!isMobile ? 'transition-transform duration-700 ease-[cubic-bezier(0.25,1,0.5,1)] group-hover/card:scale-110' : ''}`}>
                            {/* 静态封面图（不悬停时显示） */}
                            <img 
                                src={item.posterSrc || item.gifSrc} 
                                alt={item.title} 
                                className={`w-full h-full object-cover ${!isMobile ? `transition-opacity duration-300 ${isHovered ? 'opacity-0' : 'opacity-100'}` : 'opacity-100'}`}
                                loading="lazy"
                            />
                            {/* GIF 动图（悬停时才加载和显示，移动端不显示） */}
                            {!isMobile && isHovered && item.gifSrc && (
                                <img 
                                    src={item.gifSrc} 
                                    alt={item.title} 
                                    className={`absolute inset-0 w-full h-full object-cover transition-opacity duration-300 ${gifLoaded ? 'opacity-100' : 'opacity-0'}`}
                                    onLoad={() => setGifLoaded(true)}
                                />
                            )}
                        </div>

                        {/* 底部渐变遮罩 (默认透明，悬停时浮现，保证文字可读性，移动端不显示) */}
                        {!isMobile && (
                            <div className="absolute inset-0 bg-gradient-to-t from-black/95 via-black/30 to-transparent opacity-0 group-hover/card:opacity-100 transition-opacity duration-500 ease-in-out"></div>
                        )}

                        {/* 底部文字内容区 (从下往上滑入 Slide-Up，移动端不显示) */}
                        {!isMobile && (
                            <div className="absolute bottom-3 left-3 right-3 z-10 flex items-end transform translate-y-6 opacity-0 group-hover/card:translate-y-0 group-hover/card:opacity-100 transition-all duration-500 ease-[cubic-bezier(0.25,1,0.5,1)]">
                                <h3 className="text-white font-bold text-[10px] md:text-xs leading-tight mb-0 drop-shadow-md">
                                    {item.title}
                                </h3>
                            </div>
                        )}

                    </div>
                </div>
            );
        };

        const Projects = ({ t, setCursorType }) => {
            const [cols, setCols] = useState(4);
            
            // 响应式分栏逻辑：根据屏幕宽度动态决定列数
            useEffect(() => {
                const updateCols = () => {
                    if (window.innerWidth >= 1024) setCols(4); // Desktop
                    else if (window.innerWidth >= 640) setCols(3); // Tablet
                    else setCols(2); // Mobile
                };
                updateCols();
                window.addEventListener('resize', updateCols);
                return () => window.removeEventListener('resize', updateCols);
            }, []);
            
            // 将数据平均分配到对应的列数组中，移除过滤逻辑，直接使用所有卡片
            const columnsData = Array.from({ length: cols }, () => []);
            t.projects.items.forEach((item, index) => {
                columnsData[index % cols].push(item);
            });

            return (
                <section id="projects" className="py-24 md:py-32 px-4 md:px-10 max-w-[1600px] mx-auto border-t border-gray-100 dark:border-gray-900 transition-colors">
                    {/* Header Row */}
                    <div className="mb-10 flex justify-between items-end">
                        <div className="text-left">
                            <span className="text-[#B8F500] font-mono text-xs uppercase tracking-widest">{t.projects.label}</span>
                            <h2 
                                className="text-3xl md:text-5xl font-bold mt-2 mb-3 text-black dark:text-white transition-colors"
                                onMouseEnter={() => setCursorType('hover')}
                                onMouseLeave={() => setCursorType('default')}
                            >
                                {t.projects.title}<span className="text-[#B8F500]">。</span>
                            </h2>
                            <p className="text-gray-500 dark:text-gray-400 text-xs md:text-sm">{t.projects.subtitle}</p>
                        </div>
                        <div className="hidden md:flex items-center gap-2 text-xs text-gray-400 dark:text-gray-500">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-[#B8F500]">
                                <circle cx="12" cy="12" r="10"></circle>
                                <line x1="12" y1="16" x2="12" y2="12"></line>
                                <line x1="12" y1="8" x2="12.01" y2="8"></line>
                            </svg>
                            <span>鼠标悬停图片可查看动图</span>
                        </div>
                    </div>

                    {/* 智能瀑布流布局：给定固定的外框高度(h-[900px])，消除外部布局扰动，实现内部完美的纯粹手风琴挤压效果 */}
                    <div className="flex gap-2 md:gap-3 items-stretch w-full h-[600px] md:h-[750px] lg:h-[900px] overflow-hidden">
                        {columnsData.map((colItems, colIndex) => (
                            <div 
                                key={colIndex} 
                                className="flex flex-col gap-2 md:gap-3 flex-1 transition-[flex] duration-700 ease-[cubic-bezier(0.25,1,0.5,1)] hover:flex-[1.5] lg:hover:flex-[1.8]"
                            >
                                {colItems.map((item, itemIdx) => (
                                    <MasonryProjectCard 
                                        key={`${colIndex}-${itemIdx}`} 
                                        item={item} 
                                        setCursorType={setCursorType} 
                                    />
                                ))}
                            </div>
                        ))}
                    </div>

                    {/* View More Button */}
                    <div className="mt-12 flex justify-center">
                        <button 
                            className="px-6 py-3 bg-transparent border border-gray-200 dark:border-gray-800 text-black dark:text-white rounded-full font-bold text-xs md:text-sm flex items-center justify-center gap-2 hover:border-[#B8F500] hover:text-[#B8F500] transition-colors"
                            onMouseEnter={() => setCursorType('hover')}
                            onMouseLeave={() => setCursorType('default')}
                        >
                            VIEW MORE WORKS
                            <div className="w-5 h-5 rounded-full bg-[#B8F500] text-black flex items-center justify-center">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                    <polyline points="12 5 19 12 12 19"></polyline>
                                </svg>
                            </div>
                        </button>
                    </div>
                </section>
            );
        };

        const Footer = ({ t, setCursorType }) => {
            const [copiedIndex, setCopiedIndex] = useState(-1);
            
            const icons = {
                phone: <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>,
                email: <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>,
                wechat: <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
            };

            const scrollToTop = () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const copyToClipboard = async (text, index) => {
                try {
                    if (!navigator.clipboard?.writeText) {
                        throw new Error('Clipboard API unavailable');
                    }
                    await navigator.clipboard.writeText(text);
                    setCopiedIndex(index);
                    setTimeout(() => setCopiedIndex(-1), 2000);
                } catch {
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    textarea.style.position = 'fixed';
                    textarea.style.opacity = '0';
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    textarea.remove();
                    setCopiedIndex(index);
                    setTimeout(() => setCopiedIndex(-1), 2000);
                }
            };

            return (
                <footer className="py-32 px-4 md:px-16 w-full border-t border-gray-200 dark:border-gray-800 transition-colors relative overflow-hidden bg-transparent">
                    <div className="max-w-6xl mx-auto flex flex-col items-center">
                        {/* AVAILABLE FOR WORK Badge */}
                        <div className="mb-8 px-6 py-2 bg-[#B8F500] rounded-full">
                            <span className="text-xs font-bold text-black uppercase tracking-widest">Available for work</span>
                        </div>

                        {/* Header: THANK YOU */}
                        <h2 
                            className="text-6xl md:text-8xl font-black uppercase tracking-tight text-white text-center"
                            onMouseEnter={() => setCursorType('hover')}
                            onMouseLeave={() => setCursorType('default')}
                        >
                            {t.footer.title}
                        </h2>
                        
                        {/* Subtitle */}
                        <p className="mt-8 text-center text-gray-400 text-sm md:text-base leading-relaxed max-w-3xl whitespace-pre-line">
                            {t.footer.subtitle}
                        </p>

                        {/* 3 Contact Cards */}
                        <div className="grid grid-cols-3 md:flex md:flex-row gap-2 md:gap-6 mt-12 w-full justify-center items-stretch">
                            {t.footer.contacts.map((contact, idx) => (
                                <div 
                                    key={idx}
                                    className="min-w-0 h-[150px] md:h-auto md:flex-1 md:w-full md:max-w-[300px] bg-white/5 backdrop-blur-sm rounded-xl md:rounded-2xl p-2 md:p-8 flex flex-col items-center justify-center gap-2 md:gap-4 cursor-pointer group border border-white/10 transition-all duration-300 hover:border-[#B8F500]/50 hover:bg-white/10 hover:shadow-lg hover:shadow-[#B8F500]/10 hover:-translate-y-1"
                                    onMouseEnter={() => setCursorType('hover')}
                                    onMouseLeave={() => setCursorType('default')}
                                    onClick={() => copyToClipboard(contact.value, idx)}
                                >
                                    <div className={`w-9 h-9 md:w-12 md:h-12 rounded-lg md:rounded-xl bg-white/5 flex items-center justify-center transition-all duration-300 ${copiedIndex === idx ? 'text-[#B8F500] scale-110' : 'text-gray-400 group-hover:text-[#B8F500]'}`}>
                                        {copiedIndex === idx ? (
                                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                                        ) : (
                                            icons[contact.icon]
                                        )}
                                    </div>
                                    <h3 className="text-xs md:text-base font-semibold text-gray-300 tracking-wide text-center">{contact.title}</h3>
                                    <p className={`text-[9px] md:text-sm font-mono transition-colors duration-300 break-all text-center ${copiedIndex === idx ? 'text-[#B8F500]' : 'text-gray-400'}`}>{copiedIndex === idx ? '已复制!' : contact.value}</p>
                                </div>
                            ))}
                        </div>

                        {/* Copy Hint - moved below cards */}
                        <p className="mt-6 text-center text-gray-500 text-xs font-mono">
                            {t.footer.copyHint}
                        </p>

                        {/* Bottom Bar: Logo + Copyright + Top Button */}
                        <div className="w-full flex flex-col md:flex-row justify-between items-center mt-32 pt-10 border-t border-gray-800 gap-6 md:gap-0">
                            <div className="text-sm font-bold tracking-tight text-white flex items-center gap-1">
                                JIAHUAN STUDIO <span className="text-[#B8F500]">*</span>
                            </div>
                            
                            <div className="text-[10px] md:text-xs text-gray-600 font-mono tracking-widest text-center uppercase">
                                {t.footer.copyright}
                            </div>
                            
                            <button 
                                onClick={scrollToTop}
                                className="w-12 h-12 rounded-full border border-gray-700 bg-[#1a1a1a] flex items-center justify-center text-gray-500 hover:bg-gray-700 hover:text-white transition-all duration-300 cursor-pointer"
                                onMouseEnter={() => setCursorType('hover')}
                                onMouseLeave={() => setCursorType('default')}
                                title="Back to top"
                            >
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                    <line x1="12" y1="19" x2="12" y2="5"></line>
                                    <polyline points="5 12 12 5 19 12"></polyline>
                                </svg>
                            </button>
                        </div>
                    </div>
                </footer>
            );
        };

        const App = () => {
            const [isDarkMode, setIsDarkMode] = useState(true);
            const [mousePos, setMousePos] = useState({ x: -100, y: -100 });
            const [cursorType, setCursorType] = useState('default'); // 'default' | 'hover' | 'lens'
            const [mouseInWindow, setMouseInWindow] = useState(true);
            const t = dictionary['zh']; 
            
            useEffect(() => {
                if (isDarkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [isDarkMode]);

            useEffect(() => {
                const handleMouseMove = (e) => {
                    setMousePos({ x: e.clientX, y: e.clientY });
                };
                const handleMouseLeave = () => setMouseInWindow(false);
                const handleMouseEnter = () => setMouseInWindow(true);

                window.addEventListener('mousemove', handleMouseMove);
                document.addEventListener('mouseleave', handleMouseLeave);
                document.addEventListener('mouseenter', handleMouseEnter);

                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                    document.removeEventListener('mouseleave', handleMouseLeave);
                    document.removeEventListener('mouseenter', handleMouseEnter);
                };
            }, []);

            const CustomCursor = () => {
                if (!mouseInWindow) return null;

                let styles = {
                    transform: `translate3d(${mousePos.x}px, ${mousePos.y}px, 0) translate(-50%, -50%)`,
                    pointerEvents: 'none',
                    zIndex: 9999,
                    position: 'fixed',
                    top: 0,
                    left: 0,
                    borderRadius: '50%',
                    willChange: 'transform, width, height, border, background-color'
                };

                if (cursorType === 'lens') {
                    return (
                        <div 
                            style={{
                                ...styles,
                                width: '240px',
                                height: '240px',
                                border: '1.5px solid #B8F500',
                                backgroundColor: 'rgba(184, 245, 0, 0.03)',
                                transition: 'width 0.25s cubic-bezier(0.25, 1, 0.5, 1), height 0.25s cubic-bezier(0.25, 1, 0.5, 1), background-color 0.2s ease'
                            }}
                        />
                    );
                }

                if (cursorType === 'hover') {
                    return (
                        <div 
                            style={{
                                ...styles,
                                width: '80px',
                                height: '80px',
                                backgroundColor: '#ffffff',
                                mixBlendMode: 'difference',
                                transition: 'width 0.25s cubic-bezier(0.25, 1, 0.5, 1), height 0.25s cubic-bezier(0.25, 1, 0.5, 1), background-color 0.2s ease'
                            }}
                        />
                    );
                }

                return (
                    <div 
                        style={{
                            ...styles,
                            width: '32px',
                            height: '32px',
                            backgroundColor: '#ffffff',
                            mixBlendMode: 'difference',
                            transition: 'width 0.25s cubic-bezier(0.25, 1, 0.5, 1), height 0.25s cubic-bezier(0.25, 1, 0.5, 1), background-color 0.2s ease'
                        }}
                    />
                );
            };

            return (
                <div className="relative">
                    {/* 自定义动态光标 */}
                    <CustomCursor />
                    
                    <Navbar isDarkMode={isDarkMode} setIsDarkMode={setIsDarkMode} t={t} setCursorType={setCursorType} />
                    <Hero t={t} isDarkMode={isDarkMode} mousePos={mousePos} cursorType={cursorType} setCursorType={setCursorType} />
                    <About setCursorType={setCursorType} />
                    <ComicProjects t={t} setCursorType={setCursorType} />
                    <Projects t={t} setCursorType={setCursorType} />
                    <VisualExploration t={t} setCursorType={setCursorType} />
                    <Footer t={t} setCursorType={setCursorType} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
